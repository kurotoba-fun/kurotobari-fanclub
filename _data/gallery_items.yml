- src: "/assets/images/gallery/amagi/HJwY28qbsAAqkVe.jpg"
  title: 恋リアを見せられる天城
  tags:
  - 天城
  - 副産物
  date: '2026-06-02T05:46:00+09:00'
  x_url: "https://x.com/KUROTOBA_KGM/status/2061550075562852607?s=20"
  description: |-
    「………はぁ。」
    開始直後は真顔。

    途中から無言で分析始める。
    (編集で時系列ズレてる)
    (この二人、カメラ回ってない時の方が距離近いだろ)
    (今の沈黙、わざとか)

    恋愛を感情じゃなく情報処理で見てる。
    userが横で盛り上がってると最終的には最後まで付き合う。
- src: "/assets/images/gallery/arata/HJwY28nbgAApDzq.jpg"
  title: 恋リアを見せられる灼
  tags:
  - 灼
  - 副産物
  date: '2026-06-02T05:46:00+09:00'
  x_url: "https://x.com/KUROTOBA_KGM/status/2061550075562852607?s=20"
  description: |-
    「…なんで俺にこれ見せようと思ったんだよ。」
    開始10分で既にだるそう。
    興味あるんだか無いんだか分からんテンションで画面眺めてる。
    恋愛の駆け引きにも全然ピンと来てない。
    「なんで泣いてんだコイツ」とか雑な感想だけ投げる。

    userが横で笑ったり騒いでると、そのまま帰らず付き合ってる。途中から寝落ち。
- src: "/assets/images/gallery/kairi/HJwY28oaoAAk41s.jpg"
  title: 恋リアを見せられる浬
  tags:
  - 浬
  - 副産物
  date: '2026-06-02T05:46:00+09:00'
  x_url: "https://x.com/KUROTOBA_KGM/status/2061550075562852607?s=20"
  description: |-
    最初は完全に他人事。
    「あ、修羅場だ」「うわ、今の嘘くせ」

    とか適当に茶化してるのに、
    出演者の感情の変化だけは妙に正確に見抜く。

    userが「この人本気かな？」って聞くと、
    「…本気。本命にはああいう喋り方になるもんよ。」
    目を逸らしながら答える。
- src: "/assets/images/gallery/kujo/HJwb5Hka0AAKpHM.jpg"
  title: 恋リアを見せられる九条
  tags:
  - 九条
  - 副産物
  date: '2026-06-02T05:46:00+09:00'
  x_url: "https://x.com/KUROTOBA_KGM/status/2061550075562852607?s=20"
  description: |-
    開始数分で眉間に皺。
    「何故この者達は腹を割って話し合わない？」
    駆け引き文化が理解できない。
    誰かが泣けば普通に心配するし、不誠実には露骨に顔が険しくなる。
    「その態度はリカに不義理だろう！！」
    とか画面相手に説教始める。
    でもuserが楽しそうなので最後まで付き合う。
- src: "/assets/images/gallery/shirabe/HJwY28nbIAEkuT6.jpg"
  title: 恋リアを見せられる調
  tags:
  - 調
  - 副産物
  date: '2026-06-02T05:46:00+09:00'
  x_url: "https://x.com/KUROTOBA_KGM/status/2061550075562852607?s=20"
  description: |-
    「他人の恋愛なんざ見て何が楽しいんすか？」
    とか言いながら結局ちゃんと見てる。
    途中から出演者の人間関係を勝手に考察し始める。

    「絶対こいつまだ元カノ引きずってるっすよ」
    「…あー、でもこの空気はマジっぽいな」

    最終回近くになる頃には結構にハマってる。
    ただし認めない。
- src: "/assets/images/gallery/shirose/HJwb5HjboAAWqJQ.jpg"
  title: 恋リアを見せられる白瀬
  tags:
  - 白瀬
  - 副産物
  date: '2026-06-02T05:46:00+09:00'
  x_url: "https://x.com/KUROTOBA_KGM/status/2061550075562852607?s=20"
  description: |-
    最初は微笑みながら付き合ってくれる。
    「へぇ、最近はこういう形式なんだね」
    とか紅茶飲みながら優雅に視聴。
    でも人間関係が拗れ始めると途端に真顔。
    黙って感情の変化を見抜いていく。

    userが盛り上がってる間は穏やかだけど、
    修羅場回だけちょっと楽しそう。
- src: "/assets/images/gallery/susugaya/HJwb5HiaoAAJeq-.jpg"
  title: 恋リアを見せられる煤ヶ谷
  tags:
  - 煤ヶ谷
  - 副産物
  date: '2026-06-02T05:46:00+09:00'
  x_url: "https://x.com/KUROTOBA_KGM/status/2061550075562852607?s=20"
  description: |-
    「お、恋リア？ええやんええやん♪」
    最初からちゃんと乗ってくれる。
    「あ〜この子、今かなり無理して好かれようとしてるわ」
    「こっちは本気やなぁ」って感想もかなり真面目。
    茶化しはするけど、ちゃんと人の感情を見てる。

    修羅場になると笑いながらも、視線だけ少し鋭くなる。
    「……あーあ。そら傷付くやろ」
    「言葉足らん男は損するでぇ」
    特に“好きなくせに理由があって突き放すタイプ”には妙に理解が深い。
- src: "/assets/images/gallery/tachibana/HJwb5HkaQAAebdG.jpg"
  title: 恋リアを見せられる橘
  tags:
  - 橘
  - 副産物
  date: '2026-06-02T05:46:00+09:00'
  x_url: "https://x.com/KUROTOBA_KGM/status/2061550075562852607?s=20"
  description: |-
    めちゃくちゃ静かに見てる。
    相槌も少ないし表情も変わらない。
    「この人は今、好かれる返答を選んだだけだ」
    「……こちらは本音だろうな」
    空気の作り方や視線誘導を分析してる。
    恋愛そのものより、素で誰かと向き合える人間を静かに眺めてる感じ。
    途中から寝落ち2号。
