<header class="site-header">
  <div class="container header-inner">
    <div class="header-top">
      <div class="site-branding">
        <div class="site-title-row">
          <a class="site-title" href="{{ '/' | relative_url }}">
            <span class="site-logo-text">黒帳</span>
            {% if page.theme == 'academy' %}
              <img
                class="site-logo"
                src="{{ '/assets/images/site/logo_07261104.webp' | relative_url }}"
                alt="{{ site.data.site.site_title }}"
              >
              <span class="site-title-text">ファンクラブ</span>
            {% else %}
              <span class="site-title-text">黒帳 <small>KUROTOBARI FANCLUB</small></span>
            {% endif %}
          </a>
          <span class="site-badge">公認</span>
        </div>
        <p class="site-tagline">{{ site.data.site.site_tagline }}</p>
      </div>
      <button
        class="nav-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="site-nav-menu"
        aria-label="ナビゲーションメニューを開閉"
      >
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
    </div>
    <nav class="site-nav" id="site-nav-menu">
      <a href="{{ '/' | relative_url }}">トップ</a>
      <a href="{{ '/characters/' | relative_url }}">キャラクター</a>
      <a href="{{ '/academy/characters/' | relative_url }}">学園パロキャラ</a>
      <a href="{{ '/events/' | relative_url }}">イベント</a>
      <a href="{{ '/gallery/' | relative_url }}">ギャラリー</a>
      <a href="{{ '/about/' | relative_url }}">このサイトについて</a>
    </nav>
  </div>
  <script>
    (function () {
      var header = document.currentScript && document.currentScript.closest('.site-header');
      if (!header) return;

      var button = header.querySelector('.nav-toggle');
      var nav = header.querySelector('#site-nav-menu');
      if (!button || !nav) return;

      var updateHeaderState = function () {
        header.classList.toggle('is-scrolled', window.scrollY > 8);
      };

      var closeMenu = function () {
        button.setAttribute('aria-expanded', 'false');
        nav.classList.remove('is-open');
      };

      updateHeaderState();
      window.addEventListener('scroll', updateHeaderState, { passive: true });

      button.addEventListener('click', function () {
        var isOpen = button.getAttribute('aria-expanded') === 'true';
        button.setAttribute('aria-expanded', String(!isOpen));
        nav.classList.toggle('is-open', !isOpen);
      });

      nav.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', closeMenu);
      });

      window.addEventListener('resize', function () {
        if (window.innerWidth > 640) {
          closeMenu();
        }
      });
    })();
  </script>
</header>
