<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.summary %}{{ page.summary | strip_html | strip_newlines | truncate: 120 }}{% else %}{{ site.description }}{% endif %}">
  {% assign og_description = page.summary | default: site.description | strip_html | strip_newlines | truncate: 120 %}
  {% assign og_image = page.og_image | default: '/assets/images/gallery/shirabe/HHPXhA0bYAAEaye.jpg' %}
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ og_description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ og_image | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ og_image | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="theme-{{ page.theme | default: 'mainworld' }}">
  {% include header.html %}
  <main class="site-main">
    {{ content }}
  </main>
  {% include footer.html %}
</body>
</html>
